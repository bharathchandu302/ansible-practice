- name: data type
  hosts: local
  connection: local
  vars:
    course: "Devops with Aws"
    duration: 120
    is_level: true
    tools:
    - linux
    - shell
    - ansible
    concepts:
      cloud: Aws
      cm: ansible
  tasks:
  - name: print course info
    ansible.builtin.debug:
      msg: "course name : {{ course }}, duration : {{ duration }}, is_level : {{ is_level }}, tools are : {{ tools }}, concepts are : {{ concepts }}"   